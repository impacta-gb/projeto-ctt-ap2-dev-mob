name: Documentation
on:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # 1º: checkout

      - uses: actions/configure-pages@v5   # 2º: configure pages

      - uses: actions/setup-python@v5      # 3º: setup python
        with:
          python-version: 3.x

      - run: pip install zensical            # 4º: instalar dependências
      - run: zensical build --clean          # 5º: build (ajuste para seu tool)

      - uses: actions/upload-pages-artifact@v3  # 6º: upload
        with:
          path: site

      - uses: actions/deploy-pages@v4      # 7º: deploy
        id: deployment